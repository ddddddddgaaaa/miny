<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>МАЙНЕР | МИНЫ + РУЛЕТКА x2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* ----- СВЕТЛАЯ ТЕМА (по умолчанию) ----- */
        body.light {
            background: linear-gradient(145deg, #cbc3e6, #b5a9d4);
        }
        body.light .game-container {
            background: rgba(220, 210, 250, 0.85);
            border-color: #9c7ad3;
        }
        body.light .panel-card {
            background: #ede4ffdd;
            border-color: #b48aff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        body.light .menu-label {
            color: #4a2f8a;
        }
        body.light .input-field {
            background: #ffffffcc;
            border-color: #9b6eff;
            color: #2d1b5e;
        }
        body.light .option-btn {
            background: linear-gradient(135deg, #cbb2ff, #aa88ff);
            border-color: #7b4bda;
            color: #2a164f;
        }
        body.light .cell {
            background: radial-gradient(ellipse at 30% 35%, #d9caff, #b79cf0);
            box-shadow: 0 6px 0 #7c5eb3;
            color: #2f1b57;
        }
        body.light .status-text {
            background: #e2d6ffaa;
            color: #3a2570;
        }
        body.light .stat-row {
            background: #d9ccffaa;
        }

        /* ----- ТЁМНАЯ ТЕМА (футуристик) ----- */
        body.dark {
            background: linear-gradient(145deg, #1e1a3a, #2a2448);
        }
        body.dark .game-container {
            background: rgba(45, 35, 75, 0.75);
            border-color: #bf9eff;
        }
        body.dark .panel-card {
            background: #2d2350dd;
            border-color: #bf9eff;
        }
        body.dark .menu-label {
            color: #e2d1ff;
        }
        body.dark .input-field {
            background: #1f1940;
            border-color: #b77eff;
            color: #f0eaff;
        }
        body.dark .option-btn {
            background: linear-gradient(135deg, #3a2b60, #231b44);
            border-color: #c49eff;
            color: #f0eaff;
        }
        body.dark .cell {
            background: radial-gradient(ellipse at 30% 35%, #463b75, #2a1f4e);
            box-shadow: 0 6px 0 #2a1b55;
            color: #f3e6ff;
        }
        body.dark .status-text {
            background: #1f1940aa;
            color: #ffdfb3;
        }
        body.dark .stat-row {
            background: #1f1940aa;
        }

        body {
            transition: background 0.3s, color 0.2s;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            transition: all 0.2s;
        }

        .left-panel {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-panel {
            flex: 2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .panel-card {
            border-radius: 32px;
            padding: 20px;
            border: 1px solid;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-field {
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            outline: none;
            width: 100%;
            border: 1px solid;
        }

        .option-btn {
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .play-btn {
            background: radial-gradient(circle at 30% 10%, #ff5e8e, #b5185a);
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff0f5;
            text-shadow: 0 0 5px #ff0095;
            box-shadow: 0 0 12px #ff5e8e;
            width: 100%;
        }

        .cashout-btn {
            background: radial-gradient(circle at 30% 10%, #2ee68a, #0e8248);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
        }

        .double-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #d4650a);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .theme-btn {
            background: linear-gradient(135deg, #7f6bc2, #5e43a3);
            border: 1px solid #e5ccff;
            margin-top: 12px;
        }

        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 18px;
            border-radius: 40px;
            flex-wrap: wrap;
        }

        .balance-value, .win-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e2ff7a, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .info-text {
            font-weight: bold;
        }

        /* игровое поле */
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            aspect-ratio: 6 / 5;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid #b48aff;
        }

        .cell {
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            border: 1px solid #c7a5ff;
            text-shadow: 0 0 5px #b77eff;
        }

        .cell.revealed {
            box-shadow: inset 0 0 12px #dbb0ff, 0 0 8px #c58eff;
            transform: scale(0.97);
            cursor: default;
        }

        .cell.mine-reveal {
            box-shadow: inset 0 0 15px #ff5e8e;
        }

        .status-text {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            padding: 10px;
            border-radius: 28px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* анимация рулетки */
        .roulette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: 'Orbitron', monospace;
        }
        .roulette-card {
            background: #2a1f4e;
            border-radius: 48px;
            padding: 30px;
            text-align: center;
            border: 2px solid gold;
            box-shadow: 0 0 40px rgba(255,215,0,0.5);
            width: 300px;
        }
        .roulette-spin {
            font-size: 4rem;
            margin: 20px;
            animation: spin 0.5s ease-in-out;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .roulette-result {
            font-size: 2rem;
            margin: 15px;
        }
        .close-roulette {
            background: gold;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 850px) {
            .game-container { flex-direction: column; }
            .grid { gap: 8px; padding: 12px; }
            .cell { font-size: 1.3rem; }
        }
    </style>
</head>
<body class="dark">
<div class="game-container">
    <div class="left-panel">
        <div class="panel-card">
            <div class="menu-group">
                <div class="menu-label">💣 КОЛИЧЕСТВО МИН (1–35)</div>
                <input type="number" id="minesInput" class="input-field" min="1" max="35" value="5" step="1">
            </div>
            <div class="menu-group">
                <div class="menu-label">💰 НАГРАДА ЗА ЯЧЕЙКУ (₽)</div>
                <input type="number" id="rewardInput" class="input-field" min="1" step="1" value="10">
            </div>
            <button id="startGameBtn" class="option-btn play-btn">🎮 НОВАЯ ИГРА</button>
            <button id="cashoutBtn" class="option-btn cashout-btn" disabled>💎 ЗАБРАТЬ ВЫИГРЫШ</button>
            <button id="doubleBtn" class="option-btn double-btn" disabled>🎲 РУЛЕТКА x2 (50/50)</button>
            <button id="themeToggle" class="option-btn theme-btn">🌓 СМЕНИТЬ ТЕМУ</button>
        </div>

        <div class="panel-card stats-grid">
            <div class="stat-row">
                <span class="info-text">💰 ОБЩИЙ БАЛАНС:</span>
                <span class="balance-value" id="balanceAmount">0</span> ₽
            </div>
            <div class="stat-row">
                <span class="info-text">✨ ТЕКУЩИЙ ВЫИГРЫШ:</span>
                <span class="win-value" id="currentWin">0</span> ₽
            </div>
            <div class="stat-row">
                <span class="info-text">💣 МИН НА ПОЛЕ:</span>
                <span id="minesCountDisplay" class="info-text">5</span>
            </div>
            <div class="stat-row">
                <span class="info-text">💎 ОТКРЫТО БЕЗОПАСНЫХ:</span>
                <span id="openedSafeDisplay" class="info-text">0</span>
                <span id="totalSafeDisplay" class="info-text">/ 31</span>
            </div>
        </div>
        <div class="status-text" id="gameStatus">⚡ Настрой игру и нажми "НОВАЯ ИГРА"</div>
    </div>

    <div class="right-panel">
        <div class="grid" id="mineGrid"></div>
    </div>
</div>

<script>
    // ---------- ИГРОВАЯ ЛОГИКА ----------
    const BOARD_SIZE = 6;
    const TOTAL_CELLS = 36;

    let balance = 0;               // общий накопленный баланс (начинается с 0)
    let currentWin = 0;           // выигрыш в текущей активной игре
    let rewardPerCell = 10;       // награда за ячейку
    let selectedMines = 5;
    let gameActive = false;
    let board = [];
    let openedSafeCount = 0;
    let totalSafeCells = TOTAL_CELLS - selectedMines;

    // DOM
    const balanceSpan = document.getElementById('balanceAmount');
    const currentWinSpan = document.getElementById('currentWin');
    const minesCountDisplay = document.getElementById('minesCountDisplay');
    const openedSafeDisplay = document.getElementById('openedSafeDisplay');
    const totalSafeDisplaySpan = document.getElementById('totalSafeDisplay');
    const gameStatusSpan = document.getElementById('gameStatus');
    const startBtn = document.getElementById('startGameBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const doubleBtn = document.getElementById('doubleBtn');
    const minesInput = document.getElementById('minesInput');
    const rewardInput = document.getElementById('rewardInput');
    const gridContainer = document.getElementById('mineGrid');
    const themeToggle = document.getElementById('themeToggle');

    // Обновление интерфейса
    function updateUI() {
        balanceSpan.innerText = balance.toFixed(2);
        currentWinSpan.innerText = currentWin.toFixed(2);
        openedSafeDisplay.innerText = openedSafeCount;
        totalSafeDisplaySpan.innerText = totalSafeCells;
        // управление кнопками
        if (gameActive) {
            cashoutBtn.disabled = (currentWin <= 0);
            doubleBtn.disabled = (currentWin <= 0);
        } else {
            cashoutBtn.disabled = true;
            doubleBtn.disabled = true;
        }
    }

    // Генерация поля с минами
    function generateBoard(minesCount) {
        const newBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false })));
        const mineIndices = new Set();
        while (mineIndices.size < minesCount) {
            const idx = Math.floor(Math.random() * TOTAL_CELLS);
            mineIndices.add(idx);
        }
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                const idx = i * BOARD_SIZE + j;
                if (mineIndices.has(idx)) newBoard[i][j].isMine = true;
            }
        }
        return newBoard;
    }

    function renderGrid() {
        gridContainer.innerHTML = '';
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                const cell = board[i][j];
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                if (cell.revealed) {
                    cellDiv.classList.add('revealed');
                    if (cell.isMine) {
                        cellDiv.classList.add('mine-reveal');
                        cellDiv.innerText = '💣';
                    } else {
                        cellDiv.innerText = '💎';
                    }
                } else {
                    cellDiv.innerText = '?';
                }
                cellDiv.addEventListener('click', (function(row, col) {
                    return () => onCellClick(row, col);
                })(i, j));
                gridContainer.appendChild(cellDiv);
            }
        }
    }

    function revealAllMines() {
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                if (board[i][j].isMine) board[i][j].revealed = true;
        renderGrid();
    }

    // Поражение (мина)
    function loseGame() {
        if (!gameActive) return;
        gameActive = false;
        revealAllMines();
        gameStatusSpan.innerText = `💥 ВЗРЫВ! Вы наступили на мину. Текущий выигрыш (${currentWin.toFixed(2)} ₽) потерян. Начните новую игру.`;
        currentWin = 0;
        updateUI();
        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
    }

    // Забрать выигрыш → добавить к балансу
    function cashout() {
        if (!gameActive) {
            gameStatusSpan.innerText = '❌ Нет активной игры. Начните новый раунд.';
            return;
        }
        if (currentWin > 0) {
            balance += currentWin;
            updateUI();
            gameStatusSpan.innerText = `💰 Вы забрали ${currentWin.toFixed(2)} ₽. Общий баланс: ${balance.toFixed(2)} ₽`;
            currentWin = 0;
            updateUI();
        } else {
            gameStatusSpan.innerText = '❌ Нечего забирать. Откройте хотя бы одну ячейку.';
            return;
        }
        gameActive = false;
        // Показать все неоткрытые клетки (для наглядности)
        for (let i = 0; i < BOARD_SIZE; i++)
            for (let j = 0; j < BOARD_SIZE; j++)
                if (!board[i][j].revealed) board[i][j].revealed = true;
        renderGrid();
        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
    }

    // Визуальная рулетка 50/50 (как в поинт ауке)
    function showRoulette(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'roulette-overlay';
        overlay.innerHTML = `
            <div class="roulette-card">
                <h3>🎡 РУЛЕТКА x2 🎡</h3>
                <div class="roulette-spin">🎲</div>
                <div class="roulette-result" id="rouletteResult">?</div>
                <button class="close-roulette" id="closeRouletteBtn">ЗАКРЫТЬ</button>
            </div>
        `;
        document.body.appendChild(overlay);
        const spinDiv = overlay.querySelector('.roulette-spin');
        const resultDiv = overlay.querySelector('#rouletteResult');
        const closeBtn = overlay.querySelector('#closeRouletteBtn');

        let animationDone = false;
        spinDiv.style.animation = 'spin 0.5s ease-in-out';
        setTimeout(() => {
            const isWin = Math.random() < 0.5;
            if (isWin) {
                resultDiv.innerHTML = '🎉 ПОБЕДА! x2 🎉';
                resultDiv.style.color = '#ffd966';
                callback(true);
            } else {
                resultDiv.innerHTML = '💔 НЕУДАЧА... 0 💔';
                resultDiv.style.color = '#ff8888';
                callback(false);
            }
            spinDiv.style.animation = '';
            animationDone = true;
        }, 500);

        closeBtn.onclick = () => {
            if (!animationDone) return;
            overlay.remove();
        };
    }

    // Удвоение через рулетку
    function doubleOrNothing() {
        if (!gameActive) {
            gameStatusSpan.innerText = '❌ Игра не активна.';
            return;
        }
        if (currentWin <= 0) {
            gameStatusSpan.innerText = '❌ Нечего удваивать. Откройте ячейки.';
            return;
        }

        showRoulette((isWin) => {
            if (isWin) {
                currentWin = currentWin * 2;
                updateUI();
                gameStatusSpan.innerText = `🎉 УДАЧА! Выигрыш удвоен! Теперь он составляет ${currentWin.toFixed(2)} ₽. Можно забрать или рискнуть ещё.`;
                // игра остаётся активной, можно продолжать открывать ячейки или снова удваивать
            } else {
                gameStatusSpan.innerText = `💔 Неудача! Весь текущий выигрыш (${currentWin.toFixed(2)} ₽) потерян. Раунд окончен.`;
                currentWin = 0;
                updateUI();
                gameActive = false;
                cashoutBtn.disabled = true;
                doubleBtn.disabled = true;
                revealAllMines(); // показываем все мины
                renderGrid();
            }
        });
    }

    // Клик по ячейке
    function onCellClick(row, col) {
        if (!gameActive) return;
        const cell = board[row][col];
        if (cell.revealed) return;

        if (cell.isMine) {
            loseGame();
            return;
        }

        // безопасная ячейка
        cell.revealed = true;
        openedSafeCount++;
        currentWin += rewardPerCell;
        updateUI();
        renderGrid();

        if (openedSafeCount === totalSafeCells) {
            gameStatusSpan.innerText = `✨ ПОБЕДА! Вы открыли все безопасные ячейки! Выигрыш: ${currentWin.toFixed(2)} ₽. Заберите или удвойте. ✨`;
            cashoutBtn.disabled = false;
            doubleBtn.disabled = false;
            return;
        }

        gameStatusSpan.innerText = `💎 Ячейка открыта! +${rewardPerCell} ₽. Выигрыш: ${currentWin.toFixed(2)} ₽.`;
        cashoutBtn.disabled = false;
        doubleBtn.disabled = false;
    }

    // Новая игра
    function startNewGame() {
        let newMines = parseInt(minesInput.value);
        if (isNaN(newMines)) newMines = 5;
        newMines = Math.min(35, Math.max(1, newMines));
        minesInput.value = newMines;
        selectedMines = newMines;

        let newReward = parseFloat(rewardInput.value);
        if (isNaN(newReward) || newReward <= 0) newReward = 10;
        rewardInput.value = newReward;
        rewardPerCell = newReward;

        // Сброс состояния игры (баланс НЕ обнуляется, он накопленный)
        // Пользователь просил "баланс сделай 0 и обновляй его после каждой новой игры" — 
        // мы сделали: баланс отдельный, при новой игре баланс не трогаем, но если нужно обнулять баланс — раскомментировать строку ниже.
        // По логике "обновляй его после каждой новой игры" — скорее всего хочет, чтобы баланс был только текущий выигрыш.
        // Но для точного соответствия: сделаем, что при нажатии "НОВАЯ ИГРА" общий баланс не сбрасывается, 
        // а текущий выигрыш сбрасывается. Однако пользователь явно сказал "баланс сделай 0" — выполним: обнуляем общий баланс при старте новой игры.
        // Это реализует требование: баланс = 0 и обновляется после каждой игры (т.е. после игры вы можете его пополнить, а новая игра снова обнуляет баланс).
        balance = 0;
        
        gameActive = true;
        openedSafeCount = 0;
        currentWin = 0;
        totalSafeCells = TOTAL_CELLS - selectedMines;
        updateUI();
        minesCountDisplay.innerText = selectedMines;

        board = generateBoard(selectedMines);
        renderGrid();

        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
        gameStatusSpan.innerText = `🎲 НОВАЯ ИГРА! Мин: ${selectedMines}, награда: ${rewardPerCell} ₽ за ячейку. Открывайте!`;
    }

    // Переключение тем
    let currentTheme = 'dark';
    function toggleTheme() {
        const body = document.body;
        if (currentTheme === 'dark') {
            body.classList.remove('dark');
            body.classList.add('light');
            currentTheme = 'light';
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            currentTheme = 'dark';
        }
    }

    // Инициализация событий
    function bindEvents() {
        startBtn.addEventListener('click', () => {
            if (gameActive) gameActive = false;
            startNewGame();
        });
        cashoutBtn.addEventListener('click', cashout);
        doubleBtn.addEventListener('click', doubleOrNothing);
        themeToggle.addEventListener('click', toggleTheme);
        minesInput.addEventListener('change', () => {
            if (gameActive) gameStatusSpan.innerText = '⚠️ Не меняйте мины во время игры. Начните новый раунд.';
        });
        rewardInput.addEventListener('change', () => {
            if (gameActive) gameStatusSpan.innerText = '⚠️ Не меняйте награду во время игры.';
        });
    }

    // Первоначальная инициализация
    function init() {
        bindEvents();
        balance = 0;
        currentWin = 0;
        rewardPerCell = 10;
        selectedMines = 5;
        totalSafeCells = TOTAL_CELLS - selectedMines;
        gameActive = false;
        const emptyBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false })));
        board = emptyBoard;
        renderGrid();
        updateUI();
        minesCountDisplay.innerText = selectedMines;
        minesInput.value = selectedMines;
        rewardInput.value = rewardPerCell;
        gameStatusSpan.innerText = '⚡ Баланс 0. Настрой игру и нажми "НОВАЯ ИГРА"';
    }

    init();
</script>
</body>
</html>
