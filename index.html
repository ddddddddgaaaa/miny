<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Майнер | Мины и рулетка x2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e1a3a, #2a2448);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            padding: 20px;
        }

        /* основной контейнер — две колонки */
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(45, 35, 75, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            border: 1px solid #b48aff;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .left-panel {
            flex: 1.2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ПРАВАЯ ПАНЕЛЬ */
        .right-panel {
            flex: 2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .panel-card {
            background: #2d2350dd;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #bf9eff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #e2d1ff;
            text-transform: uppercase;
            font-weight: 600;
        }

        .input-field {
            background: #1f1940;
            border: 1px solid #b77eff;
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            color: #f0eaff;
            outline: none;
            width: 100%;
        }

        .input-field:focus {
            border-color: #ffb86b;
            box-shadow: 0 0 8px #ffb86b;
        }

        .option-btn {
            background: linear-gradient(135deg, #3a2b60, #231b44);
            border: 1px solid #c49eff;
            color: #f0eaff;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: #5a3f9e;
            border-color: #ffd58c;
        }

        .play-btn {
            background: radial-gradient(circle at 30% 10%, #ff5e8e, #b5185a);
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff0f5;
            text-shadow: 0 0 5px #ff0095;
            box-shadow: 0 0 12px #ff5e8e;
            width: 100%;
        }

        .cashout-btn {
            background: radial-gradient(circle at 30% 10%, #2ee68a, #0e8248);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
        }

        .double-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #d4650a);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #1f1940aa;
            padding: 12px 18px;
            border-radius: 40px;
            flex-wrap: wrap;
        }

        .balance-value {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e2ff7a, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .win-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffe3a3;
            text-shadow: 0 0 5px #ffae42;
        }

        .info-text {
            color: #cfb3ff;
            font-weight: bold;
        }

        /* ИГРОВОЕ ПОЛЕ 6x6 */
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            aspect-ratio: 6 / 5;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 18px;
            border-radius: 48px;
            width: 100%;
            border: 1px solid #b48aff;
        }

        .cell {
            background: radial-gradient(ellipse at 30% 35%, #463b75, #2a1f4e);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 6px 0 #2a1b55;
            border: 1px solid #c7a5ff;
            text-shadow: 0 0 5px #b77eff;
            color: #f3e6ff;
        }

        .cell.revealed {
            background: radial-gradient(ellipse at 30% 35%, #5e48a3, #38296b);
            box-shadow: inset 0 0 12px #dbb0ff, 0 0 8px #c58eff;
            transform: scale(0.97);
            cursor: default;
        }

        .cell.mine-reveal {
            background: #a13a5e;
            box-shadow: inset 0 0 15px #ff5e8e;
        }

        .status-text {
            font-size: 0.85rem;
            color: #ffdfb3;
            text-align: center;
            margin-top: 12px;
            background: #1f1940aa;
            padding: 10px;
            border-radius: 28px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 850px) {
            .game-container {
                flex-direction: column;
            }
            .grid {
                gap: 8px;
                padding: 12px;
            }
            .cell {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- ЛЕВАЯ ПАНЕЛЬ: настройки, баланс, управление -->
    <div class="left-panel">
        <div class="panel-card">
            <div class="menu-group">
                <div class="menu-label">💣 КОЛИЧЕСТВО МИН (1–35)</div>
                <input type="number" id="minesInput" class="input-field" min="1" max="35" value="5" step="1">
            </div>
            <div class="menu-group">
                <div class="menu-label">💰 НАГРАДА ЗА ЯЧЕЙКУ (₽)</div>
                <input type="number" id="rewardInput" class="input-field" min="1" step="1" value="10">
            </div>
            <button id="startGameBtn" class="option-btn play-btn">🎮 НОВАЯ ИГРА</button>
            <button id="cashoutBtn" class="option-btn cashout-btn" disabled>💎 ЗАБРАТЬ ВЫИГРЫШ</button>
            <button id="doubleBtn" class="option-btn double-btn" disabled>🎲 РУЛЕТКА x2 (УДВОИТЬ)</button>
        </div>

        <div class="panel-card stats-grid">
            <div class="stat-row">
                <span class="info-text">💰 БАЛАНС:</span>
                <span class="balance-value" id="balanceAmount">1000</span> ₽
            </div>
            <div class="stat-row">
                <span class="info-text">✨ ТЕКУЩИЙ ВЫИГРЫШ:</span>
                <span class="win-value" id="currentWin">0</span> ₽
            </div>
            <div class="stat-row">
                <span class="info-text">💣 МИН НА ПОЛЕ:</span>
                <span id="minesCountDisplay" class="info-text">5</span>
            </div>
            <div class="stat-row">
                <span class="info-text">💎 ОТКРЫТО БЕЗОПАСНЫХ:</span>
                <span id="openedSafeDisplay" class="info-text">0</span>
                <span id="totalSafeDisplay" class="info-text">/ 31</span>
            </div>
        </div>
        <div class="status-text" id="gameStatus">⚡ Настрой игру и нажми "НОВАЯ ИГРА"</div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: минное поле 6x6 -->
    <div class="right-panel">
        <div class="grid" id="mineGrid"></div>
    </div>
</div>

<script>
    // ---------- ИГРОВАЯ ЛОГИКА ----------
    const BOARD_SIZE = 6;
    const TOTAL_CELLS = 36;

    // Состояние
    let balance = 1000;           // рубли
    let rewardPerCell = 10;       // награда за одну безопасную ячейку
    let selectedMines = 5;        // количество мин
    let gameActive = false;        // активен ли раунд
    let board = [];                // 2d массив { isMine, revealed }
    let openedSafeCount = 0;       // сколько безопасных ячеек открыто
    let totalSafeCells = TOTAL_CELLS - selectedMines;
    let currentWinAmount = 0;      // выигрыш в текущем раунде (ещё не добавлен в баланс)
    let gameOverFlag = false;

    // DOM элементы
    const gridContainer = document.getElementById('mineGrid');
    const balanceSpan = document.getElementById('balanceAmount');
    const currentWinSpan = document.getElementById('currentWin');
    const minesCountDisplay = document.getElementById('minesCountDisplay');
    const openedSafeDisplay = document.getElementById('openedSafeDisplay');
    const totalSafeDisplaySpan = document.getElementById('totalSafeDisplay');
    const gameStatusSpan = document.getElementById('gameStatus');
    const startBtn = document.getElementById('startGameBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const doubleBtn = document.getElementById('doubleBtn');
    const minesInput = document.getElementById('minesInput');
    const rewardInput = document.getElementById('rewardInput');

    // Обновление UI баланса/выигрыша
    function updateUI() {
        balanceSpan.innerText = balance.toFixed(2);
        currentWinSpan.innerText = currentWinAmount.toFixed(2);
        openedSafeDisplay.innerText = openedSafeCount;
        totalSafeDisplaySpan.innerText = totalSafeCells;
    }

    // Генерация поля с заданным количеством мин
    function generateBoard(minesCount) {
        const newBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false })));
        const total = TOTAL_CELLS;
        const mineIndices = new Set();
        while (mineIndices.size < minesCount) {
            const idx = Math.floor(Math.random() * total);
            mineIndices.add(idx);
        }
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                const idx = i * BOARD_SIZE + j;
                if (mineIndices.has(idx)) {
                    newBoard[i][j].isMine = true;
                }
            }
        }
        return newBoard;
    }

    // Отрисовка сетки
    function renderGrid() {
        gridContainer.innerHTML = '';
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                const cell = board[i][j];
                const cellDiv = document.createElement('div');
                cellDiv.classList.add('cell');
                if (cell.revealed) {
                    cellDiv.classList.add('revealed');
                    if (cell.isMine) {
                        cellDiv.classList.add('mine-reveal');
                        cellDiv.innerText = '💣';
                    } else {
                        cellDiv.innerText = '💎';
                    }
                } else {
                    cellDiv.innerText = '?';
                }
                cellDiv.addEventListener('click', (function(row, col) {
                    return function() { onCellClick(row, col); };
                })(i, j));
                gridContainer.appendChild(cellDiv);
            }
        }
    }

    // Открыть все мины (при проигрыше)
    function revealAllMines() {
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                if (board[i][j].isMine) {
                    board[i][j].revealed = true;
                }
            }
        }
        renderGrid();
    }

    // Поражение (мина)
    function loseGame() {
        if (!gameActive) return;
        gameActive = false;
        gameOverFlag = true;
        revealAllMines();
        currentWinAmount = 0;
        updateUI();
        gameStatusSpan.innerText = '💥 ВЗРЫВ! Вы наступили на мину. Выигрыш обнулён. Начните новую игру.';
        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
    }

    // Завершение игры с добавлением выигрыша (кэшаут)
    function cashout() {
        if (!gameActive) {
            gameStatusSpan.innerText = '❌ Нет активной игры. Начните раунд.';
            return;
        }
        if (currentWinAmount > 0) {
            balance += currentWinAmount;
            updateUI();
            gameStatusSpan.innerText = `💰 Вы забрали ${currentWinAmount.toFixed(2)} ₽. Баланс: ${balance.toFixed(2)} ₽`;
        } else {
            gameStatusSpan.innerText = '❌ Нечего забирать.';
        }
        gameActive = false;
        gameOverFlag = true;
        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
        // Показываем все оставшиеся ячейки? Для честности оставляем как есть, но игра завершена.
        // Дополнительно можно открыть все неоткрытые ячейки (но не обязательно)
        for (let i = 0; i < BOARD_SIZE; i++) {
            for (let j = 0; j < BOARD_SIZE; j++) {
                if (!board[i][j].revealed) {
                    // просто визуально показываем, но без кликов (игра не активна)
                    board[i][j].revealed = true;
                }
            }
        }
        renderGrid();
    }

    // Мини-рулетка: удвоение текущего выигрыша с риском 50%
    function doubleOrNothing() {
        if (!gameActive) {
            gameStatusSpan.innerText = '❌ Игра не активна.';
            return;
        }
        if (currentWinAmount <= 0) {
            gameStatusSpan.innerText = '❌ Нечего удваивать. Откройте хотя бы одну ячейку.';
            return;
        }

        const win = Math.random() < 0.5; // 50% на победу
        if (win) {
            const doubled = currentWinAmount * 2;
            currentWinAmount = doubled;
            updateUI();
            gameStatusSpan.innerText = `🎉 УДАЧА! Выигрыш удвоен! Теперь он составляет ${currentWinAmount.toFixed(2)} ₽. Вы можете забрать или сыграть ещё раз.`;
            // После удвоения игра продолжается, можно снова удваивать или забрать
        } else {
            gameStatusSpan.innerText = `💔 Неудача! Вы проиграли весь текущий выигрыш (${currentWinAmount.toFixed(2)} ₽). Раунд окончен.`;
            currentWinAmount = 0;
            updateUI();
            gameActive = false;
            gameOverFlag = true;
            cashoutBtn.disabled = true;
            doubleBtn.disabled = true;
            revealAllMines(); // показываем все мины для наглядности
        }
        // Если игра завершена проигрышем рулетки, блокируем кнопки.
        if (!gameActive) {
            cashoutBtn.disabled = true;
            doubleBtn.disabled = true;
        } else {
            // если удвоение прошло успешно, кнопки остаются активными
            cashoutBtn.disabled = false;
            doubleBtn.disabled = false;
        }
    }

    // Клик по ячейке
    function onCellClick(row, col) {
        if (!gameActive) return;
        const cell = board[row][col];
        if (cell.revealed) return;

        if (cell.isMine) {
            loseGame();
            return;
        }

        // Открываем безопасную ячейку
        cell.revealed = true;
        openedSafeCount++;
        currentWinAmount += rewardPerCell;
        updateUI();
        renderGrid();

        // Проверка на полный сбор всех безопасных ячеек (победа)
        if (openedSafeCount === totalSafeCells) {
            gameStatusSpan.innerText = `✨ ПОБЕДА! Вы открыли все безопасные ячейки! Выигрыш: ${currentWinAmount.toFixed(2)} ₽. Заберите выигрыш. ✨`;
            // Игра продолжается, но больше нет ячеек для открытия. Позволяем забрать или удвоить.
            gameActive = true; // остаёмся активными для кэшаута/удвоения
            cashoutBtn.disabled = false;
            doubleBtn.disabled = false;
            // больше кликать некуда, все клетки открыты (мины могут оставаться скрытыми, но их трогать нельзя)
            return;
        }

        gameStatusSpan.innerText = `💎 Ячейка открыта! +${rewardPerCell} ₽. Всего выигрыш: ${currentWinAmount.toFixed(2)} ₽. Можно продолжить или забрать.`;
        cashoutBtn.disabled = false;
        doubleBtn.disabled = false;
    }

    // Запуск новой игры
    function startNewGame() {
        // Считываем настройки из полей ввода
        let newMines = parseInt(minesInput.value);
        if (isNaN(newMines)) newMines = 5;
        newMines = Math.min(35, Math.max(1, newMines));
        minesInput.value = newMines;
        selectedMines = newMines;

        let newReward = parseFloat(rewardInput.value);
        if (isNaN(newReward) || newReward <= 0) newReward = 10;
        rewardInput.value = newReward;
        rewardPerCell = newReward;

        // Проверка баланса: по логике игры не нужно списывать ставку, игра просто на риск.
        // Но чтобы избежать бесконечного забирания без риска, можно разрешить играть всегда.
        // Баланс используется только для вывода, старт бесплатный. Но для интереса оставим.

        // Сброс состояния
        gameActive = true;
        gameOverFlag = false;
        openedSafeCount = 0;
        currentWinAmount = 0;
        totalSafeCells = TOTAL_CELLS - selectedMines;
        updateUI();
        minesCountDisplay.innerText = selectedMines;

        // Генерируем новое поле
        board = generateBoard(selectedMines);
        renderGrid();

        cashoutBtn.disabled = false; // можно сразу забрать 0? лучше сделать недоступной пока нет выигрыша
        doubleBtn.disabled = true;   // пока нет выигрыша удвоение недоступно
        if (currentWinAmount === 0) {
            cashoutBtn.disabled = true;
        }

        gameStatusSpan.innerText = `🎲 Новая игра! Мин на поле: ${selectedMines}. Награда за ячейку: ${rewardPerCell} ₽. Открывайте ячейки!`;
    }

    // Обновление доступности кнопок при изменении выигрыша (вызывается из updateUI, но добавим логику)
    function updateButtonsByWin() {
        if (gameActive) {
            cashoutBtn.disabled = (currentWinAmount <= 0);
            doubleBtn.disabled = (currentWinAmount <= 0);
        } else {
            cashoutBtn.disabled = true;
            doubleBtn.disabled = true;
        }
    }

    // Переопределим updateUI, чтобы управлять кнопками
    const originalUpdateUI = updateUI;
    window.updateUI = function() {
        originalUpdateUI();
        updateButtonsByWin();
    };
    updateUI = window.updateUI;

    // Привязка событий
    function bindEvents() {
        startBtn.addEventListener('click', () => {
            // Если игра активна, можно принудительно начать новую (старая отменяется)
            if (gameActive) {
                gameActive = false;
            }
            startNewGame();
        });
        cashoutBtn.addEventListener('click', cashout);
        doubleBtn.addEventListener('click', doubleOrNothing);
        // Дополнительно: при изменении полей ввода во время игры — предупреждение, но не блокируем
        minesInput.addEventListener('change', () => {
            if (gameActive) {
                gameStatusSpan.innerText = '⚠️ Не меняйте количество мин во время игры. Начните новый раунд.';
            }
        });
        rewardInput.addEventListener('change', () => {
            if (gameActive) {
                gameStatusSpan.innerText = '⚠️ Не меняйте награду за ячейку во время игры.';
            }
        });
    }

    // Инициализация: пустое поле, настройки по умолчанию
    function init() {
        bindEvents();
        balance = 1000;
        rewardPerCell = 10;
        selectedMines = 5;
        totalSafeCells = TOTAL_CELLS - selectedMines;
        currentWinAmount = 0;
        gameActive = false;
        // Создаём пустую доску без мин (для отображения)
        const emptyBoard = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({ isMine: false, revealed: false })));
        board = emptyBoard;
        renderGrid();
        updateUI();
        minesCountDisplay.innerText = selectedMines;
        minesInput.value = selectedMines;
        rewardInput.value = rewardPerCell;
        cashoutBtn.disabled = true;
        doubleBtn.disabled = true;
        gameStatusSpan.innerText = '⚡ Настрой количество мин и награду, затем нажми "НОВАЯ ИГРА"';
    }

    init();
</script>
</body>
</html>
